<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refinery Shift Log</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZcBH04eyHMm1sVK2-vl3QzKVyb2XhU6c",
            authDomain: "refinery-log.firebaseapp.com",
            databaseURL: "https://refinery-log-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "refinery-log",
            storageBucket: "refinery-log.firebasestorage.app",
            messagingSenderId: "453589843848",
            appId: "1:453589843848:web:180cc827c0d6de661e443d",
            measurementId: "G-1YQRB5PPGV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let bxChartObj = null;
        let phChartObj = null;
        let levelChartObj = null;

        function refreshView() {
            const area = document.getElementById('areaSelect').value;
            const timeframe = parseInt(document.getElementById('timeframeSelect').value);
            
            const flowContainer = document.getElementById('flowContainer');
            if (area === 'Melt') {
                flowContainer.style.display = 'block';
            } else {
                flowContainer.style.display = 'none';
                document.getElementById('flowRate').value = '';
            }
            loadChartData(area, timeframe);
        }

        document.getElementById('areaSelect').addEventListener('change', refreshView);
        document.getElementById('timeframeSelect').addEventListener('change', refreshView);

        window.submitData = function() {
            const manager = document.getElementById('managerName').value;
            const area = document.getElementById('areaSelect').value;
            const bx = parseFloat(document.getElementById('bx').value);
            const ph = parseFloat(document.getElementById('ph').value);
            const level = parseFloat(document.getElementById('level').value);
            const flow = parseFloat(document.getElementById('flowRate').value) || null;

            if (!manager || manager === "" || !bx || !ph || !level) {
                alert("Please select your Name and fill in BX, pH, and Level.");
                return;
            }

            const now = new Date();
            const dateString = now.toLocaleDateString(); 
            const timeString = now.toLocaleTimeString(); 

            const logRef = ref(db, 'logs/' + area);
            
            push(logRef, {
                timestamp: now.getTime(),
                date: dateString,
                time: timeString,
                manager: manager,
                bx: bx,
                ph: ph,
                level: level,
                flow: flow
            }).then(() => {
                alert(`Data Logged Successfully by ${manager} at ${timeString}!`);
                document.getElementById('managerName').value = ''; 
                document.getElementById('bx').value = '';
                document.getElementById('ph').value = '';
                document.getElementById('level').value = '';
                document.getElementById('flowRate').value = '';
            }).catch((error) => {
                alert("Error saving data: " + error);
            });
        };

        function loadChartData(area, pointsLimit) {
            const logRef = query(ref(db, 'logs/' + area), orderByChild('timestamp'), limitToLast(pointsLimit));
            
            onValue(logRef, (snapshot) => {
                const data = [];
                const labels = [];
                let bxSum = 0, phSum = 0, levelSum = 0;

                snapshot.forEach((child) => {
                    const val = child.val();
                    const date = new Date(val.timestamp);
                    
                    if(pointsLimit <= 8) {
                        labels.push(`${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`);
                    } else {
                        labels.push(`${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:00`);
                    }
                    
                    data.push(val);
                    bxSum += val.bx;
                    phSum += val.ph;
                    levelSum += val.level;
                });

                if (data.length > 0) {
                    document.getElementById('avgDisplay').innerText = 
                        `Current View Avg - BX: ${(bxSum/data.length).toFixed(2)} | pH: ${(phSum/data.length).toFixed(2)} | Level: ${(levelSum/data.length).toFixed(1)}%`;
                    updateCharts(labels, data.map(d => d.bx), data.map(d => d.ph), data.map(d => d.level));
                } else {
                    document.getElementById('avgDisplay').innerText = "Waiting for shift data...";
                    if(bxChartObj) bxChartObj.destroy();
                    if(phChartObj) phChartObj.destroy();
                    if(levelChartObj) levelChartObj.destroy();
                }
            });
        }

        function updateCharts(labels, bxData, phData, levelData) {
            const ctxBx = document.getElementById('bxChart').getContext('2d');
            if (bxChartObj) bxChartObj.destroy();
            bxChartObj = new Chart(ctxBx, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: 'Brix (BX)', data: bxData, borderColor: '#0056b3', backgroundColor: '#0056b3', tension: 0.1 }] },
                options: { responsive: true, maintainAspectRatio: false }
            });

            const ctxPh = document.getElementById('phChart').getContext('2d');
            if (phChartObj) phChartObj.destroy();
            phChartObj = new Chart(ctxPh, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: 'pH Level', data: phData, borderColor: '#28a745', backgroundColor: '#28a745', tension: 0.1 }] },
                options: { responsive: true, maintainAspectRatio: false }
            });

            const ctxLevel = document.getElementById('levelChart').getContext('2d');
            if (levelChartObj) levelChartObj.destroy();
            levelChartObj = new Chart(ctxLevel, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: 'Tank Level (%)', data: levelData, borderColor: '#ff8c00', backgroundColor: '#ff8c00', tension: 0.1 }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        window.onload = () => {
            loadChartData('Melt', 4);
            setInterval(() => {
                const clock = document.getElementById('liveClock');
                if(clock) clock.innerText = new Date().toLocaleString();
            }, 1000);
        };
    </script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        button { background: #0056b3; color: white; border: none; padding: 12px 20px; cursor: pointer; width: 100%; font-size: 16px; border-radius: 4px; margin-top: 10px;}
        button:hover { background: #003d82; }
        .chart-container { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .single-chart { height: 200px; margin-bottom: 30px; }
        .chart-title { text-align: center; margin-bottom: 5px; color: #555; font-size: 14px; text-transform: uppercase; font-weight: bold;}
        #avgDisplay { font-weight: bold; text-align: center; margin-bottom: 20px; color: #333; font-size: 16px; padding: 10px; background-color: #e9ecef; border-radius: 4px;}
        .info-text { font-size: 13px; color: #666; text-align: center; margin-top: 15px; background: #eef2f5; padding: 10px; border-radius: 4px; border: 1px solid #dcdcdc;}
        #liveClock { font-weight: bold; color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>Golden Sugar Refinery - Shift Log</h2>
    <form id="logForm" onsubmit="event.preventDefault(); submitData();">
        
        <div class="form-group">
            <label>Shift Manager Name</label>
            <select id="managerName" required>
                <option value="" disabled selected>Select your name...</option>
                <option value="Austin">Austin</option>
                <option value="Niejo">Niejo</option>
                <option value="Val">Val</option>
                <option value="Adeyamo">Adeyamo</option>
                <option value="Alonge">Alonge</option>
                <option value="Ema1">Ema1</option>
                <option value="Ema2">Ema2</option>
                <option value="Okafor">Okafor</option>
            </select>
        </div>

        <div class="form-group">
            <label>Process Area</label>
            <select id="areaSelect">
                <option value="Melt">Melt Area</option>
                <option value="GAC_Feed_240">GAC Feed 240</option>
                <option value="Precoat_Feed_200">Precoat Feed 200</option>
                <option value="Evaporator_Feed_020">Evaporator Feed 020</option>
                <option value="R1_Feed">R1 Feed Tanks</option>
            </select>
        </div>
        <div class="form-group" id="flowContainer">
            <label>Melt Flow Rate (ton/h)</label>
            <input type="number" id="flowRate" step="0.1" placeholder="Enter flow rate">
        </div>
        <div class="form-group">
            <label>Brix (BX)</label>
            <input type="number" id="bx" step="0.1" required placeholder="Enter BX">
        </div>
        <div class="form-group">
            <label>pH Level</label>
            <input type="number" id="ph" step="0.1" required placeholder="Enter pH">
        </div>
        <div class="form-group">
            <label>Tank Level (%)</label>
            <input type="number" id="level" step="0.1" required placeholder="Enter Level">
        </div>
        <button type="submit">Log Entry</button>
        
        <p class="info-text">🕒 Current Time: <span id="liveClock">Loading...</span><br>Date and Time are automatically recorded upon submission.</p>
    </form>

    <div class="chart-container">
        <div class="chart-header">
            <h3>Process Profiles</h3>
            <select id="timeframeSelect">
                <option value="4">Last 12 Hours</option>
                <option value="56">Last 7 Days</option>
                <option value="240">Last 30 Days</option>
                <option value="2880">Last 360 Days</option>
            </select>
        </div>
        <div id="avgDisplay">Waiting for shift data...</div>
        <div class="chart-title">Brix (BX) Profile</div>
        <div class="single-chart"><canvas id="bxChart"></canvas></div>
        <div class="chart-title">pH Profile</div>
        <div class="single-chart"><canvas id="phChart"></canvas></div>
        <div class="chart-title">Tank Level Profile</div>
        <div class="single-chart"><canvas id="levelChart"></canvas></div>
    </div>
</div>
</body>
</html>
